spring.application.name=portfolio
# Railway assigns a dynamic port via PORT environment variable
server.port=${PORT:8081}

# Cloudflare R2 Configurations (from Environment Variables or fallbacks)
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY:dummy-access-key}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY:dummy-secret-key}
cloudflare.r2.endpoint=${CLOUDFLARE_R2_ENDPOINT:https://dummy-r2-endpoint.com}
cloudflare.r2.bucket=${CLOUDFLARE_R2_BUCKET:dummy-bucket}
cloudflare.r2.public-url=${CLOUDFLARE_R2_PUBLIC_URL:https://dummy-public-url.com}

# JWT Configurations
jwt.secret=${JWT_SECRET:vuthanhluan_portfolio_jwt_secret_key_2026_super_secure_key}
jwt.access-token-expiration=86400000

# CORS Allowed Origins (Comma-separated for Spring conversion to List)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:3000,https://vuthanhluan.bond}

# Database Configurations (Local MySQL fallback, overridden by Railway environment variables)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:portfolio}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:4326}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
